name: Feature request
description: Propose a product, gallery, artwork, or interaction improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What should become possible?
      description: Explain the user need, not only the implementation idea.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed direction
      description: Describe the experience, constraints, and tradeoffs.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: References
      description: Link examples, museum references, sketches, or motion studies.
    validations:
      required: false
